<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐱 냥이 공학 계산기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Nanum+Gothic+Coding:wght@400;700&family=Black+Han+Sans&display=swap');
:root{
  --bg:#0d0d1a;--card:#1a1a35;--border:#2e2e5e;
  --a1:#ff6bbd;--a2:#6bffd8;--a3:#ffe06b;--a4:#a78bfa;
  --text:#e8e8ff;--dim:#7070aa;
  --fn:#1f1f42;--op:#1a2e42;--num:#1a1a35;
  --sh:rgba(255,107,189,0.3);--g2:rgba(107,255,216,0.2);
  --ok:#6bffd8;--ng:#ff6b6b;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);font-family:'Nanum Gothic Coding',monospace;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:16px 10px 60px;
  background-image:
    radial-gradient(ellipse 60% 40% at 20% 10%,rgba(167,139,250,.08) 0%,transparent 60%),
    radial-gradient(ellipse 50% 30% at 80% 80%,rgba(255,107,189,.08) 0%,transparent 60%);
}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;gap:10px;margin-bottom:4px;
  width:100%;max-width:480px;justify-content:center;position:relative;
}
h1{
  font-family:'Black Han Sans',sans-serif;color:var(--a1);
  font-size:1.5rem;letter-spacing:2px;text-shadow:0 0 18px var(--sh);
}
.icon-btn{
  font-family:'DotGothic16',monospace;font-size:0.72rem;
  padding:4px 10px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--card);
  color:var(--dim);cursor:pointer;transition:all .2s;
  white-space:nowrap;
}
.icon-btn:hover{border-color:var(--a4);color:var(--a4);}
.icon-btn.help{border-color:var(--a3);color:var(--a3);}
.icon-btn.help:hover{box-shadow:0 0 10px rgba(255,224,107,.3);}

/* lang selector */
.lang-sel{
  font-family:'DotGothic16',monospace;font-size:0.7rem;
  padding:4px 8px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--card);
  color:var(--a2);cursor:pointer;outline:none;
  transition:all .2s;
}
.lang-sel:hover,.lang-sel:focus{border-color:var(--a2);}
.lang-sel option{background:#1a1a35;color:var(--text);}

.subtitle{font-family:'DotGothic16',monospace;color:var(--dim);font-size:.7rem;margin-bottom:12px;letter-spacing:1px;}

/* ── MODE SWITCH ── */
.mode-switch{
  display:flex;margin-bottom:10px;
  border:1.5px solid var(--border);border-radius:24px;overflow:hidden;background:var(--card);
}
.mode-btn{
  font-family:'DotGothic16',monospace;font-size:.76rem;
  padding:6px 20px;background:transparent;border:none;
  color:var(--dim);cursor:pointer;transition:all .2s;
}
.mode-btn.active{background:var(--a1);color:#fff;box-shadow:0 0 14px var(--sh);}
.mode-btn:not(.active):hover{color:var(--a4);}

/* ── LEVEL TABS ── */
.tabs{display:flex;gap:5px;margin-bottom:12px;}
.tab{
  font-family:'DotGothic16',monospace;font-size:.73rem;
  padding:5px 12px;border-radius:20px;
  border:1.5px solid var(--border);background:var(--card);
  color:var(--dim);cursor:pointer;transition:all .2s;
}
.tab.active{border-color:var(--a1);color:var(--a1);background:rgba(255,107,189,.12);box-shadow:0 0 10px var(--sh);}
.tab:hover:not(.active){border-color:var(--a4);color:var(--a4);}

/* ── MAIN LAYOUT ── */
.calc-wrap{display:flex;gap:12px;align-items:flex-start;}
.calc{
  width:340px;background:var(--card);border-radius:20px;
  border:1.5px solid var(--border);
  box-shadow:0 8px 40px rgba(0,0,0,.5),0 0 0 1px rgba(255,107,189,.05);
  overflow:hidden;position:relative;
}

/* ── NORMAL DISPLAY ── */
.display{
  background:#080814;padding:14px 16px 10px;min-height:100px;
  position:relative;border-bottom:1.5px solid var(--border);
}
.display .lbadge{font-family:'DotGothic16',monospace;font-size:.6rem;color:var(--a2);opacity:.7;letter-spacing:1px;margin-bottom:3px;}
.display .expr{font-family:'DotGothic16',monospace;font-size:.76rem;color:var(--dim);min-height:16px;word-break:break-all;margin-bottom:4px;}
.display .result{font-family:'DotGothic16',monospace;font-size:1.85rem;color:var(--a2);text-align:right;text-shadow:0 0 14px var(--g2);letter-spacing:1px;word-break:break-all;}
.display .result.error{color:var(--a1);font-size:1rem;}
.display .deg-badge{
  position:absolute;top:10px;right:12px;
  font-family:'DotGothic16',monospace;font-size:.6rem;
  padding:2px 7px;border-radius:7px;border:1px solid var(--border);
  color:var(--a3);cursor:pointer;user-select:none;transition:all .2s;
}
.display .deg-badge:hover{border-color:var(--a3);}

/* ── QUIZ DISPLAY ── */
.quiz-display{
  background:#080814;padding:12px 16px 10px;
  border-bottom:1.5px solid var(--border);display:none;position:relative;
}
.quiz-display.active{display:block;}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.quiz-badge{font-family:'DotGothic16',monospace;font-size:.6rem;color:var(--a3);letter-spacing:1px;}
.score-row{display:flex;gap:8px;font-family:'DotGothic16',monospace;font-size:.63rem;}
.s-ok{color:var(--ok);} .s-ng{color:var(--ng);} .s-str{color:var(--a3);} .s-pts{color:var(--a4);}
.quiz-q{font-family:'DotGothic16',monospace;font-size:.9rem;color:var(--text);line-height:1.6;min-height:36px;margin-bottom:5px;word-break:keep-all;}
.quiz-hint{font-family:'DotGothic16',monospace;font-size:.63rem;color:var(--a4);opacity:.85;min-height:13px;}
.timer-bar{height:3px;background:var(--border);border-radius:2px;margin-top:7px;overflow:hidden;}
.timer-fill{height:100%;background:linear-gradient(90deg,var(--a2),var(--a3));border-radius:2px;transition:width 1s linear;}

/* ── SCORE METHOD BADGE ── */
.method-badge{
  display:none;align-items:center;gap:6px;
  background:#0a0a18;border-bottom:1px solid var(--border);
  padding:5px 16px;font-family:'DotGothic16',monospace;font-size:.6rem;
}
.method-badge.active{display:flex;}
.method-tag{
  padding:2px 8px;border-radius:6px;border:1px solid;
  font-size:.6rem;font-family:'DotGothic16',monospace;
}
.method-tag.calc-used{border-color:var(--a3);color:var(--a3);}
.method-tag.manual{border-color:var(--ok);color:var(--ok);}
.method-label{color:var(--dim);}

/* ── QUIZ ANSWER ROW ── */
.quiz-ans-row{
  background:#0a0a18;border-bottom:1.5px solid var(--border);
  padding:6px 16px;display:none;align-items:center;gap:8px;
}
.quiz-ans-row.active{display:flex;}
.ans-label{font-family:'DotGothic16',monospace;font-size:.63rem;color:var(--dim);white-space:nowrap;}
.ans-val{font-family:'DotGothic16',monospace;font-size:1.25rem;color:var(--a2);flex:1;text-align:right;text-shadow:0 0 10px var(--g2);word-break:break-all;min-height:26px;}

/* ── FEEDBACK OVERLAY ── */
.fb-overlay{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'DotGothic16',monospace;font-size:1.2rem;font-weight:bold;
  opacity:0;pointer-events:none;transition:opacity .25s;z-index:10;
}
.fb-overlay.ok{background:rgba(107,255,216,.15);color:var(--ok);opacity:1;}
.fb-overlay.ng{background:rgba(255,107,107,.15);color:var(--ng);opacity:1;}

/* ── BUTTONS ── */
.btn-grid{padding:10px;display:grid;gap:6px;}
.btn-grid.basic   {grid-template-columns:repeat(4,1fr);}
.btn-grid.mid     {grid-template-columns:repeat(5,1fr);}
.btn-grid.advanced{grid-template-columns:repeat(5,1fr);}
.btn{
  font-family:'DotGothic16',monospace;font-size:.8rem;height:42px;
  border-radius:9px;border:1.5px solid var(--border);cursor:pointer;
  transition:all .12s;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;user-select:none;
}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .1s;border-radius:inherit;}
.btn:active::after{background:rgba(255,255,255,.07);}
.btn:hover{transform:translateY(-1px);}
.btn:active{transform:translateY(1px);}
.btn-num{background:var(--num);color:var(--text);}
.btn-num:hover{border-color:var(--a4);box-shadow:0 0 8px rgba(167,139,250,.2);}
.btn-op{background:var(--op);color:var(--a2);}
.btn-op:hover{border-color:var(--a2);box-shadow:0 0 8px var(--g2);}
.btn-fn{background:var(--fn);color:var(--a4);font-size:.7rem;}
.btn-fn:hover{border-color:var(--a4);}
.btn-eq{background:var(--a1);color:#fff;border-color:var(--a1);box-shadow:0 2px 10px var(--sh);font-size:1rem;}
.btn-eq:hover{box-shadow:0 4px 18px var(--sh);}
.btn-clear{background:rgba(255,107,189,.12);color:var(--a1);border-color:rgba(255,107,189,.4);}
.btn-clear:hover{background:rgba(255,107,189,.2);}
.btn-const{background:rgba(255,224,107,.07);color:var(--a3);font-size:.68rem;}
.btn-const:hover{border-color:var(--a3);}
.btn.span2{grid-column:span 2;}
.quiz-submit{
  background:linear-gradient(135deg,#a78bfa,#ff6bbd)!important;
  border-color:var(--a4)!important;color:#fff!important;
  font-size:.72rem!important;box-shadow:0 2px 12px rgba(167,139,250,.4)!important;
}
.quiz-submit:hover{box-shadow:0 4px 20px rgba(167,139,250,.6)!important;}

/* ── CAT PANEL ── */
.cat-panel{width:118px;display:flex;flex-direction:column;align-items:center;gap:9px;padding-top:2px;}
.cat-cv{image-rendering:pixelated;width:96px;height:96px;}
.cat-bubble{
  background:var(--card);border:1.5px solid var(--border);border-radius:12px;
  padding:7px 9px;font-family:'DotGothic16',monospace;font-size:.66rem;
  color:var(--text);text-align:center;line-height:1.6;min-height:50px;
  width:100%;position:relative;transition:all .3s;word-break:keep-all;
}
.cat-bubble::before{content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);border:4px solid transparent;border-bottom-color:var(--border);}
.cat-bubble::after {content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%);border:3px solid transparent;border-bottom-color:var(--card);}
.cat-mood{font-family:'DotGothic16',monospace;font-size:.6rem;color:var(--dim);letter-spacing:1px;}

/* Quiz stats */
.q-stats{width:118px;display:none;flex-direction:column;gap:5px;margin-top:3px;}
.q-stats.show{display:flex;}
.sbox{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:5px 7px;font-family:'DotGothic16',monospace;font-size:.6rem;text-align:center;}
.sval{font-size:1.05rem;display:block;margin-bottom:1px;}
.sval.g{color:var(--ok);} .sval.p{color:var(--a4);} .sval.y{color:var(--a3);}
.slbl{color:var(--dim);font-size:.56rem;}
.next-btn{
  width:100%;font-family:'DotGothic16',monospace;font-size:.68rem;
  padding:6px;border-radius:7px;border:1.5px solid var(--a2);
  background:rgba(107,255,216,.1);color:var(--a2);cursor:pointer;
  transition:all .2s;display:none;margin-top:1px;
}
.next-btn.show{display:block;}
.next-btn:hover{background:rgba(107,255,216,.2);box-shadow:0 0 10px var(--g2);}

/* ── HISTORY ── */
.hist-wrap{width:340px;margin-top:8px;}
.hist-title{font-family:'DotGothic16',monospace;font-size:.63rem;color:var(--dim);margin-bottom:5px;padding-left:3px;letter-spacing:1px;}
.hist-list{max-height:100px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;}
.hist-list::-webkit-scrollbar{width:3px;}
.hist-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.hist-item{
  background:var(--card);border:1px solid var(--border);border-radius:7px;
  padding:4px 9px;font-family:'DotGothic16',monospace;font-size:.68rem;
  color:var(--dim);display:flex;justify-content:space-between;cursor:pointer;transition:border-color .15s;
}
.hist-item:hover{border-color:var(--a4);color:var(--text);}
.h-res{color:var(--a2);}

/* ── MODAL ── */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  display:none;align-items:center;justify-content:center;z-index:100;
  backdrop-filter:blur(4px);
}
.modal-bg.open{display:flex;}
.modal{
  background:var(--card);border:1.5px solid var(--border);
  border-radius:18px;width:min(480px,94vw);max-height:82vh;
  overflow-y:auto;box-shadow:0 12px 50px rgba(0,0,0,.6);
  animation:modalIn .25s cubic-bezier(.34,1.56,.64,1);
}
.modal::-webkit-scrollbar{width:4px;}
.modal::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
@keyframes modalIn{0%{transform:scale(.88);opacity:0}100%{transform:scale(1);opacity:1}}
.modal-header{
  padding:16px 20px 12px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.modal-title{font-family:'Black Han Sans',sans-serif;color:var(--a1);font-size:1.1rem;letter-spacing:1px;}
.modal-close{
  font-family:'DotGothic16',monospace;font-size:.75rem;
  padding:4px 12px;border-radius:8px;border:1.5px solid var(--border);
  background:transparent;color:var(--dim);cursor:pointer;transition:all .2s;
}
.modal-close:hover{border-color:var(--a1);color:var(--a1);}
.modal-tabs{display:flex;border-bottom:1px solid var(--border);}
.mtab{
  font-family:'DotGothic16',monospace;font-size:.72rem;
  padding:8px 18px;background:transparent;border:none;
  color:var(--dim);cursor:pointer;transition:all .2s;
  border-bottom:2px solid transparent;
}
.mtab.active{color:var(--a2);border-bottom-color:var(--a2);}
.mtab:hover:not(.active){color:var(--a4);}
.modal-body{padding:16px 20px;}
.modal-body.hidden{display:none;}
.help-section{margin-bottom:18px;}
.help-section h3{
  font-family:'DotGothic16',monospace;font-size:.72rem;
  color:var(--a3);letter-spacing:1px;margin-bottom:8px;
  padding-bottom:4px;border-bottom:1px solid var(--border);
}
.help-section p,.help-section li{
  font-family:'Nanum Gothic Coding',monospace;font-size:.76rem;
  color:var(--text);line-height:1.8;
}
.help-section ul{padding-left:16px;}
.help-section li{margin-bottom:3px;}
.help-pill{
  display:inline-block;padding:1px 7px;border-radius:5px;
  font-family:'DotGothic16',monospace;font-size:.65rem;margin:1px;
}
.pill-ok{background:rgba(107,255,216,.15);border:1px solid var(--ok);color:var(--ok);}
.pill-half{background:rgba(255,224,107,.12);border:1px solid var(--a3);color:var(--a3);}
.pill-fn{background:rgba(167,139,250,.12);border:1px solid var(--a4);color:var(--a4);}
.score-table{width:100%;border-collapse:collapse;margin-top:6px;}
.score-table th,.score-table td{
  font-family:'DotGothic16',monospace;font-size:.68rem;
  padding:5px 8px;text-align:left;border:1px solid var(--border);
}
.score-table th{background:rgba(167,139,250,.1);color:var(--a4);}
.score-table td{color:var(--text);}

/* ── PARTICLES ── */
.par{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;animation:pfall 1.2s ease-out forwards;z-index:999;}
@keyframes pfall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(200px) rotate(720deg);opacity:0}}

/* scanline */
.display::before,.quiz-display::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px);
  pointer-events:none;z-index:1;
}

@keyframes catBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes catCalc  {0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
@keyframes catShake {0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}60%{transform:translateX(4px)}}
@keyframes popIn    {0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes flashG   {0%,100%{box-shadow:none}50%{box-shadow:0 0 28px var(--ok)}}
@keyframes flashR   {0%,100%{box-shadow:none}50%{box-shadow:0 0 28px var(--ng)}}
.c-bounce{animation:catBounce .5s ease-in-out 3;}
.c-calc  {animation:catCalc   .5s ease-in-out 3;}
.c-shake {animation:catShake  .4s ease-in-out 2;}
.pop-in  {animation:popIn     .3s cubic-bezier(.34,1.56,.64,1);}
.fl-ok   {animation:flashG .6s ease-in-out;}
.fl-ng   {animation:flashR .6s ease-in-out;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <h1 id="appTitle">🐱 냥이 공학계산기</h1>
  <button class="icon-btn help" onclick="openHelp()">❓ <span data-i="help">도움말</span></button>
  <select class="lang-sel" id="langSel" onchange="setLang(this.value)">
    <option value="ko">🇰🇷 한국어</option>
    <option value="en">🇺🇸 English</option>
    <option value="ja">🇯🇵 日本語</option>
    <option value="zh">🇨🇳 中文</option>
  </select>
</div>
<p class="subtitle" id="appSub">▓▒░ ENGINEERING CAT CALCULATOR v3.0 ░▒▓</p>

<!-- MODE SWITCH -->
<div class="mode-switch">
  <button class="mode-btn active" id="modeCalcBtn" onclick="setMode('calc')" data-i="mCalc">🔢 계산기</button>
  <button class="mode-btn" id="modeQuizBtn" onclick="setMode('quiz')" data-i="mQuiz">🐱 퀴즈 모드</button>
</div>

<!-- LEVEL TABS -->
<div class="tabs">
  <button class="tab active" onclick="setLevel('basic')" data-i="lvBasic">🌱 중학생</button>
  <button class="tab" onclick="setLevel('mid')" data-i="lvMid">📐 고등학생</button>
  <button class="tab" onclick="setLevel('advanced')" data-i="lvAdv">🎓 대학생</button>
</div>

<div class="calc-wrap">
  <div>
    <div class="calc" id="calcBody">

      <!-- NORMAL DISPLAY -->
      <div class="display" id="normalDisplay">
        <div class="lbadge" id="levelBadge">BASIC MODE</div>
        <div class="expr" id="exprDisplay"></div>
        <div class="result" id="resultDisplay">0</div>
        <div class="deg-badge" id="degBadge" onclick="toggleDeg()">DEG</div>
        <div class="fb-overlay" id="calcFb"></div>
      </div>

      <!-- QUIZ DISPLAY -->
      <div class="quiz-display" id="quizDisplay">
        <div class="quiz-header">
          <span class="quiz-badge" id="quizBadge">🌱 중학생 QUIZ</span>
          <div class="score-row">
            <span class="s-ok">✓<span id="sOk">0</span></span>
            <span class="s-ng">✗<span id="sNg">0</span></span>
            <span class="s-str">🔥<span id="sStr">0</span></span>
            <span class="s-pts">⭐<span id="sPts">0</span></span>
          </div>
        </div>
        <div class="quiz-q" id="quizQ">...</div>
        <div class="quiz-hint" id="quizHint"></div>
        <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
        <div class="fb-overlay" id="quizFb"></div>
      </div>

      <!-- METHOD BADGE (quiz mode) -->
      <div class="method-badge" id="methodBadge">
        <span class="method-label" id="methodLabel">입력 방식:</span>
        <span class="method-tag manual" id="methodTag" data-i="manual">✋ 수동 입력 (+1점)</span>
      </div>

      <!-- QUIZ ANSWER ROW -->
      <div class="quiz-ans-row" id="quizAnsRow">
        <span class="ans-label" id="ansLabel">내 답:</span>
        <span class="ans-val" id="ansVal">0</span>
      </div>

      <div class="btn-grid basic" id="btnGrid"></div>
    </div>

    <div class="hist-wrap">
      <div class="hist-title" id="histTitle">▸ 계산 기록</div>
      <div class="hist-list" id="histList"></div>
    </div>
  </div>

  <!-- CAT PANEL -->
  <div class="cat-panel">
    <canvas class="cat-cv" id="catCv" width="16" height="16"></canvas>
    <div class="cat-bubble" id="catBubble">안녕냥~<br>계산해줄게요!</div>
    <div class="cat-mood" id="catMood">( ᵔ ᵕ ᵔ )</div>

    <div class="q-stats" id="qStats">
      <div class="sbox"><span class="sval g" id="statAcc">--%</span><span class="slbl" data-i="statAcc">정답률</span></div>

let lang = 'ko';
function t(k){ return I18N[lang][k] || I18N.ko[k] || k; }

function applyLang(){
  const L=I18N[lang];
  document.getElementById('appTitle').textContent=L.appTitle;
  document.getElementById('methodLabel').textContent=L.methodLabel;
  document.getElementById('ansLabel').textContent=L.ansLabel;
  document.getElementById('histTitle').textContent=state.mode==='quiz'?L.histQuiz:L.histCalc;
  document.getElementById('nextBtn').textContent=L.nextQ;
  // data-i elements (outside modal)
  document.querySelectorAll('[data-i]').forEach(el=>{
    const k=el.getAttribute('data-i');
    if(L[k]!==undefined) el.innerHTML=L[k];
  });
  document.getElementById('quizBadge').textContent=L.quizBadge[state.level];
  document.getElementById('levelBadge').textContent=L.levelBadge[state.level];
  updateMethodTag();
  document.querySelectorAll('.slbl[data-i]').forEach(el=>{
    const k=el.getAttribute('data-i'); if(L[k])el.textContent=L[k];
  });
  buildButtons();
  // Re-render help modal content (always, so it's ready on next open)
  renderHelp();
}

function setLang(l){ lang=l; applyLang(); }

function toRad(d){return state.deg?d*Math.PI/180:d;}
function toDeg(r){return state.deg?r*180/Math.PI:r;}
function factorial(n){n=Math.round(n);if(n<0)return NaN;if(n<=1)return 1;if(n>170)return Infinity;let r=1;for(let i=2;i<=n;i++)r*=i;return r;}
function evaluate(expr){
  let e=expr
    .replace(/×/g,'*').replace(/÷/g,'/')
    .replace(/π/g,'(Math.PI)').replace(/\be\b/g,'(Math.E)')
    .replace(/sin\(/g,'_sin(').replace(/cos\(/g,'_cos(').replace(/tan\(/g,'_tan(')
    .replace(/asin\(/g,'_asin(').replace(/acos\(/g,'_acos(').replace(/atan\(/g,'_atan(')
    .replace(/ln\(/g,'_ln(').replace(/log\(/g,'_log(')
    .replace(/√\(/g,'_sqrt(').replace(/√(\d+\.?\d*)/g,'_sqrt($1)')
    .replace(/\|([^|]+)\|/g,'_abs($1)')
    .replace(/(\d+\.?\d*)\s*!\s*/g,'_fac($1)')
    .replace(/(\S+)\^(\S+)/g,'Math.pow($1,$2)');
  const _sin=x=>Math.sin(toRad(x)),_cos=x=>Math.cos(toRad(x)),_tan=x=>Math.tan(toRad(x));
  const _asin=x=>toDeg(Math.asin(x)),_acos=x=>toDeg(Math.acos(x)),_atan=x=>toDeg(Math.atan(x));
  const _ln=x=>Math.log(x),_log=x=>Math.log10(x),_sqrt=x=>Math.sqrt(x),_abs=x=>Math.abs(x),_fac=x=>factorial(x);
  try{return Function('_sin','_cos','_tan','_asin','_acos','_atan','_ln','_log','_sqrt','_abs','_fac',`"use strict";return(${e})`)(_sin,_cos,_tan,_asin,_acos,_atan,_ln,_log,_sqrt,_abs,_fac);}
  catch(err){throw new Error('error');}
}
function fmt(n){if(!isFinite(n))return n===Infinity?'∞':'NaN';if(Number.isInteger(n)&&Math.abs(n)<1e15)return String(n);return String(parseFloat(n.toPrecision(10)));}

function handleBtn(label, isSpecial=false){
  const disp=document.getElementById('resultDisplay');
  const exprEl=document.getElementById('exprDisplay');
  // Mark calculator used if special function pressed in quiz mode
  if(state.mode==='quiz' && isSpecial && !state.quiz.answered){
    state.calcUsed=true;
    updateMethodTag();
  }
  switch(label){
    case 'AC':
      state.expr='';state.result='0';
      disp.textContent='0';disp.className='result';exprEl.textContent='';
      if(state.mode==='quiz'){
        document.getElementById('ansVal').textContent='0';
        // reset calcUsed only if question not yet answered
        if(!state.quiz.answered){ state.calcUsed=false; updateMethodTag(); }
      } else setCat('idle');
      return;
    case '=':
      if(!state.expr.trim())return;
      setCat('calc');exprEl.textContent=state.expr+' =';
      setTimeout(()=>{
        try{const r=evaluate(state.expr),f=fmt(r);state.result=f;disp.textContent=f;disp.className='result pop-in';addHist(state.expr,f);setCat(isNaN(r)||!isFinite(r)?'error':'happy');disp.className='result';}
        catch(err){disp.textContent='Error!';disp.className='result error';setCat('error');}
      },400);return;
    case '±':state.expr=state.expr?`-(${state.expr})`:'';break;
    case '%':state.expr+='%';break;
    case 'x²':state.expr+='^2';setCat('think');break;
    case 'xʸ':state.expr+='^';setCat('think');break;
    case '√':state.expr+='√(';setCat('think');break;
    case '1/x':state.expr=`1/(${state.expr})`;setCat('think');break;
    case 'x!':state.expr+='!';setCat('think');break;
    case 'eˣ':state.expr+='e^(';setCat('think');break;
    case '10ˣ':state.expr+='10^(';setCat('think');break;
    case 'sin':case 'cos':case 'tan':
    case 'asin':case 'acos':case 'atan':
    case 'ln':case 'log':
      state.expr+=label+'(';setCat('think');break;
    default:
      state.expr+=label;
      if(!isNaN(label)||label==='.')setCat('idle');
  }
  exprEl.textContent=state.expr;
  try{
    if(state.expr){const r=evaluate(state.expr);if(isFinite(r)&&!isNaN(r)){const f=fmt(r);disp.textContent=f;disp.className='result';if(state.mode==='quiz')document.getElementById('ansVal').textContent=f;}}
  }catch(e){disp.textContent=state.result||'0';}
}

let usedQ=[];
function pickQ(){
  const bank=QB[state.level];
  let avail=bank.map((_,i)=>i).filter(i=>!usedQ.includes(i));
  if(!avail.length){usedQ=[];avail=bank.map((_,i)=>i);}
  const idx=avail[Math.floor(Math.random()*avail.length)];
  usedQ.push(idx);return{...bank[idx],idx};
}
function startTimer(){
  clearInterval(state.quiz.timerInt);state.quiz.timerLeft=60;
  const fill=document.getElementById('timerFill');
  fill.style.width='100%';fill.style.background='linear-gradient(90deg,var(--a2),var(--a3))';
  state.quiz.timerInt=setInterval(()=>{
    if(state.quiz.answered){clearInterval(state.quiz.timerInt);return;}
    state.quiz.timerLeft--;
    const p=(state.quiz.timerLeft/60)*100;
    fill.style.width=p+'%';
    if(p<30)fill.style.background='linear-gradient(90deg,#ff6b6b,#ff6bbd)';
    if(state.quiz.timerLeft<=0){clearInterval(state.quiz.timerInt);if(!state.quiz.answered)timeOut();}
  },1000);
}
function timeOut(){
  state.quiz.answered=true;state.quiz.wrong++;state.quiz.streak=0;
  updateScores();
  const L=I18N[lang];
  showFb(false,`${L.fbTimeout} ${fmt(state.quiz.current.a)}`);
  setCat('cry');addQLog(state.quiz.current.q,'⏱',state.quiz.current.a,false,0);
  document.getElementById('nextBtn').classList.add('show');updateStats();
}
function nextQuestion(){
  state.quiz.answered=false;state.calcUsed=false;
  state.quiz.current=pickQ();
  document.getElementById('quizQ').textContent=state.quiz.current.q;
  document.getElementById('quizHint').textContent='';
  document.getElementById('nextBtn').classList.remove('show');
  state.expr='';state.result='0';
  document.getElementById('resultDisplay').textContent='0';
  document.getElementById('exprDisplay').textContent='';
  document.getElementById('ansVal').textContent='0';
  const fb=document.getElementById('quizFb');fb.className='fb-overlay';fb.textContent='';
  const cb=document.getElementById('calcBody');cb.classList.remove('fl-ok','fl-ng');
  updateMethodTag();
  setCat('quiz');startTimer();
}
function submitQuiz(){
  if(state.quiz.answered)return;
  if(!state.expr.trim()&&state.result==='0')return;
  clearInterval(state.quiz.timerInt);setCat('calc');
  setTimeout(()=>{
    try{
      const r=evaluate(state.expr||state.result);
      const f=fmt(r);
      document.getElementById('resultDisplay').textContent=f;
      document.getElementById('ansVal').textContent=f;
      const q=state.quiz.current,tol=q.t||0.5;
      const ok=Math.abs(r-q.a)<=tol;
      state.quiz.answered=true;
      const L=I18N[lang];
      if(ok){
        // Score: 0.5 if calcUsed, 1.0 if manual
        const pts=state.calcUsed?0.5:1.0;
        state.quiz.correct++;state.quiz.streak++;state.quiz.points+=pts;
        if(state.quiz.streak>state.quiz.bestStreak)state.quiz.bestStreak=state.quiz.streak;
        updateScores();
        showFb(true,`${L.fbOk} ${state.calcUsed?'(+0.5)':'(+1.0)'}`);
        spawnConfetti();
        setCat(state.quiz.streak>=3?'superHappy':'happy');
        addQLog(q.q,f,q.a,true,pts);
      }else{
        state.quiz.wrong++;state.quiz.streak=0;
        updateScores();
        showFb(false,`${L.fbNg_pre} ${fmt(q.a)}`);
        const hint=getHint(q);
        if(hint)document.getElementById('quizHint').textContent=L.hintPrefix+hint;
        setCat('cry');addQLog(q.q,f,q.a,false,0);
      }
      document.getElementById('nextBtn').classList.add('show');updateStats();
    }catch(err){document.getElementById('resultDisplay').textContent='Error!';setCat('error');}
  },350);
}
function showFb(ok,txt){
  const fb=document.getElementById('quizFb');
  fb.textContent=txt;fb.className=`fb-overlay ${ok?'ok':'ng'}`;
  const cb=document.getElementById('calcBody');cb.classList.remove('fl-ok','fl-ng');void cb.offsetWidth;
  cb.classList.add(ok?'fl-ok':'fl-ng');
  setTimeout(()=>cb.classList.remove('fl-ok','fl-ng'),700);
}
function updateScores(){
  document.getElementById('sOk').textContent=state.quiz.correct;
  document.getElementById('sNg').textContent=state.quiz.wrong;
  document.getElementById('sStr').textContent=state.quiz.streak;
  document.getElementById('sPts').textContent=state.quiz.points;
}
function updateStats(){
  const tot=state.quiz.correct+state.quiz.wrong;
  document.getElementById('statAcc').textContent=(tot?Math.round(state.quiz.correct/tot*100):0)+'%';
  document.getElementById('statPts').textContent=state.quiz.points;
  document.getElementById('statBest').textContent=state.quiz.bestStreak;
}
function addQLog(q,ans,ca,ok,pts){
  state.quiz.log.unshift({q,ans,ca,ok,pts});
  if(state.quiz.log.length>8)state.quiz.log.pop();
  const el=document.getElementById('histList');
  const ptsStr=ok?(pts===1?'+1':'+0.5'):'';
  el.innerHTML=state.quiz.log.map(l=>
    `<div class="hist-item"><span style="color:${l.ok?'var(--ok)':'var(--ng)'}">${l.ok?'✓':'✗'} ${l.q.replace(/\n.*/,'').slice(0,16)}</span><span class="h-res">${l.ans}${l.ok?' <span style="color:var(--a3);font-size:.58rem">(+'+l.pts+')</span>':''}</span></div>`
  ).join('');
}

//  MODE / LEVEL / DEG
// ══════════════════════════════════════════════
function setMode(m){
  state.mode=m;const isQ=m==='quiz';
  document.getElementById('modeCalcBtn').classList.toggle('active',!isQ);
  document.getElementById('modeQuizBtn').classList.toggle('active',isQ);
  document.getElementById('normalDisplay').style.display=isQ?'none':'block';
  document.getElementById('quizDisplay').classList.toggle('active',isQ);
  document.getElementById('quizAnsRow').classList.toggle('active',isQ);
  document.getElementById('methodBadge').classList.toggle('active',isQ);
  document.getElementById('qStats').classList.toggle('show',isQ);
  const L=I18N[lang];
  document.getElementById('histTitle').textContent=isQ?L.histQuiz:L.histCalc;
  document.getElementById('histList').innerHTML='';
  if(isQ){
    state.quiz.correct=0;state.quiz.wrong=0;state.quiz.streak=0;
    state.quiz.bestStreak=0;state.quiz.points=0;state.quiz.log=[];usedQ=[];state.calcUsed=false;
    updateScores();updateStats();document.getElementById('nextBtn').classList.remove('show');
    nextQuestion();
  }else{
    clearInterval(state.quiz.timerInt);
    state.expr='';state.result='0';
    document.getElementById('resultDisplay').textContent='0';
    document.getElementById('exprDisplay').textContent='';
    renderHist();setCat('idle');
  }
  buildButtons();
}

const LV_NAMES={basic:{ko:'BASIC MODE',en:'BASIC MODE',ja:'BASIC MODE',zh:'BASIC MODE'},mid:{ko:'MID MODE',en:'MID MODE',ja:'MID MODE',zh:'MID MODE'},advanced:{ko:'ADVANCED MODE',en:'ADVANCED MODE',ja:'ADVANCED MODE',zh:'ADVANCED MODE'}};

function setLevel(lv){
  state.level=lv;state.expr='';state.result='0';
  document.getElementById('resultDisplay').textContent='0';
  document.getElementById('exprDisplay').textContent='';
  document.getElementById('levelBadge').textContent=LV_NAMES[lv][lang]||LV_NAMES[lv].en;
  document.getElementById('quizBadge').textContent=I18N[lang].quizBadge[lv];
  document.getElementById('degBadge').style.display=lv==='basic'?'none':'';
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['basic','mid','advanced'][i]===lv));
  buildButtons();
  if(state.mode==='quiz'){
    usedQ=[];state.quiz.correct=0;state.quiz.wrong=0;state.quiz.streak=0;
    state.quiz.bestStreak=0;state.quiz.points=0;state.quiz.log=[];state.calcUsed=false;
    updateScores();updateStats();document.getElementById('histList').innerHTML='';
    nextQuestion();
  }else setCat('happy');
}
function toggleDeg(){
  state.deg=!state.deg;
  document.getElementById('degBadge').textContent=state.deg?'DEG':'RAD';setCat('think');
}

// ══════════════════════════════════════════════
//  HELP MODAL  — fully dynamic render
// ══════════════════════════════════════════════
let _helpTab = 0;

function renderHelp(){
  const L = I18N[lang];
  const mi = document.getElementById('modalInner');

  // Score unit label per language
  const ptUnit = {ko:'점', en:' pt', ja:'点', zh:'分'}[lang]||'';

  // Build tab body HTML
  const calcBody = `
    <div class="modal-body" id="hbody0">
      <div class="help-section">
        <h3>${L.h_basic_title}</h3>
        <ul>
          <li>${L.h_basic_1}</li>
          <li>${L.h_basic_2}</li>
          <li>${L.h_basic_3}</li>
          <li>${L.h_basic_4}</li>
        </ul>
      </div>
      <div class="help-section">
        <h3>${L.h_level_title}</h3>
        <ul>
          <li>${L.h_lv1}</li>
          <li>${L.h_lv2}</li>
          <li>${L.h_lv3}</li>
        </ul>
      </div>
      <div class="help-section">
        <h3>${L.h_fn_title}</h3>
        <p>
          <span class="help-pill pill-fn">sin/cos/tan</span>
          <span class="help-pill pill-fn">asin/acos/atan</span>
          <span class="help-pill pill-fn">ln</span>
          <span class="help-pill pill-fn">log(₁₀)</span>
          <span class="help-pill pill-fn">√</span>
          <span class="help-pill pill-fn">xʸ</span>
          <span class="help-pill pill-fn">x!</span>
          <span class="help-pill pill-fn">eˣ</span>
        </p>
        <ul style="margin-top:8px">
          <li>${L.h_fn1}</li>
          <li>${L.h_fn2}</li>
        </ul>
      </div>
    </div>`;

  const quizBody = `
    <div class="modal-body hidden" id="hbody1">
      <div class="help-section">
        <h3>${L.q_how_title}</h3>
        <ul>
          <li>${L.q_how_1}</li>
          <li>${L.q_how_2}</li>
          <li>${L.q_how_3}</li>
          <li>${L.q_how_4}</li>
        </ul>
      </div>
      <div class="help-section">
        <h3>${L.q_score_title}</h3>
        <table class="score-table">
          <thead>
            <tr>
              <th>${L.sc_method}</th>
              <th>${L.sc_score}</th>
              <th>${L.sc_desc}</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><span class="help-pill pill-ok">${L.sc_manual_label}</span></td>
              <td style="color:var(--ok)"><b>+1.0${ptUnit}</b></td>
              <td>${L.sc_manual}</td>
            </tr>
            <tr>
              <td><span class="help-pill pill-half">${L.sc_calc_label}</span></td>
              <td style="color:var(--a3)"><b>+0.5${ptUnit}</b></td>
              <td>${L.sc_calc}</td>
            </tr>
            <tr>
              <td><span style="color:var(--ng)">${L.sc_wrong_label}</span></td>
              <td style="color:var(--ng)"><b>+0${ptUnit}</b></td>
              <td>${L.sc_wrong}</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="help-section">
        <h3>${L.q_tip_title}</h3>
        <ul>
          <li>${L.q_tip_1}</li>
          <li>${L.q_tip_2}</li>
          <li>${L.q_tip_3}</li>
          <li>${L.q_tip_4}</li>
        </ul>
      </div>
    </div>`;

  mi.innerHTML = `
    <div class="modal-header">
      <span class="modal-title">${L.helpTitle}</span>
      <button class="modal-close" onclick="closeHelp()">&times; ${L.close}</button>
    </div>
    <div class="modal-tabs">
      <button class="mtab${_helpTab===0?' active':''}" id="htab0" onclick="showHelpTab(0)">${L.htCalc}</button>
      <button class="mtab${_helpTab===1?' active':''}" id="htab1" onclick="showHelpTab(1)">${L.htQuiz}</button>
    </div>
    ${calcBody}
    ${quizBody}`;

  // Apply current tab visibility
  const b0=document.getElementById('hbody0'), b1=document.getElementById('hbody1');
  if(b0) b0.classList.toggle('hidden', _helpTab!==0);
  if(b1) b1.classList.toggle('hidden', _helpTab!==1);
}

function openHelp(){
  _helpTab=0;
  renderHelp();
  document.getElementById('helpModal').classList.add('open');
}
function closeHelp(e){
  if(!e||e.target===document.getElementById('helpModal'))
    document.getElementById('helpModal').classList.remove('open');
}
function showHelpTab(n){
  _helpTab=n;
  const b0=document.getElementById('hbody0'), b1=document.getElementById('hbody1');
  const t0=document.getElementById('htab0'),  t1=document.getElementById('htab1');
  if(b0){ b0.classList.toggle('hidden',n!==0); t0.classList.toggle('active',n===0); }
  if(b1){ b1.classList.toggle('hidden',n!==1); t1.classList.toggle('active',n===1); }
}

// ══════════════════════════════════════════════
//  KEYBOARD
// ══════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(document.getElementById('helpModal').classList.contains('open')){if(e.key==='Escape')closeHelp();return;}
  const map={'Enter':'=','Escape':'AC','+':'+','-':'-','*':'×','/':'÷','(':'(',')':')','.'  :'.','%':'%'};
  if(e.key in map){e.preventDefault();if(state.mode==='quiz'&&e.key==='Enter')submitQuiz();else handleBtn(map[e.key],false);return;}
  if(e.key==='Backspace'){e.preventDefault();state.expr=state.expr.slice(0,-1);document.getElementById('exprDisplay').textContent=state.expr;return;}
  if(/^\d$/.test(e.key))handleBtn(e.key,false);
});

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
buildButtons();drawCat('idle');setCat('idle',false);
document.getElementById('degBadge').style.display='none';
renderHelp(); // pre-render modal in default language
setInterval(()=>{if(state.catState==='idle'&&state.mode==='calc'&&Math.random()<0.3){const n=['idle','think'][Math.floor(Math.random()*2)];setCat(n);setTimeout(()=>setCat('idle'),2000);}},4000);
</script>
</body>
</html>
